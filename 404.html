<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Campus Relay</title>
    <script type="text/javascript">
      // GitHub Pages에서는 '/CampusRelay'와 같이 1개의 경로(segment)를 유지해야 하고,
      // Cloudflare Pages나 로컬호스트에서는 루트('/')에서 시작하므로 0개로 설정해야 합니다.
      var pathSegmentsToKeep = window.location.hostname.endsWith('github.io') ? 1 : 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
